version: "3.8"

services:
  api:
    build: .
    container_name: api-projeto-trainee
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - DB_HOST=db
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: db-api-projeto-trainee
    restart: always
    environment:
      MYSQL_DATABASE: store-projeto-trainee
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
