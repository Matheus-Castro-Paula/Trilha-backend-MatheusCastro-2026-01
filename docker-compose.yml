version: "3.8"

services:
  api:
    build: .
    container_name: comp_junior_api
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: comp_junior_db
    restart: always
    environment:
      MYSQL_DATABASE: comp_junior_store
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
